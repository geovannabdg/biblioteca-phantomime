<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca Phantomime</title>

    <style>
        :root {
            --abyss: #010b16;
            --deep: #021B33;
            --ocean: #062a4d;
            --water: #1f6fb2;
            --glow: #4cc9ff;
            --text: white;
            --title: #e7edf5;

            --btn-edit: #2a9d8f;
            --btn-delete: #e74c3c;

            --shadow: #021B33;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(180deg, var(--abyss), var(--deep), var(--ocean));
            color: var(--text);

            transition:
                background 0.5s ease,
                color 0.5s ease;
        }

        .container {
            max-width: 1200px;
            margin: auto;
            padding: 25px;
        }

        h1 {
            text-align: center;

            font-family: "Bodoni 72", "Didot", "Times New Roman", serif;
            font-size: 50px;
            font-weight: 400;

            letter-spacing: 4px;

            color: var(--title);

            text-shadow:
                0 3px 12px rgba(0, 0, 0, 0.8);
        }


        .panel {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(12px);
            padding: 20px;
            border-radius: 14px;
        }

        .themes {
            text-align: center;
            margin-bottom: 20px;
        }

        .themes button {
            margin: 5px;
        }

        input,
        textarea {
            padding: 10px;
            border-radius: 10px;
            border: none;
            font-family: inherit;
            background: rgba(255, 255, 255, 0.08);
            color: var(--text);
            border: 1px solid rgba(76, 201, 255, 0.3);
            outline: none;
            transition: .3s;
        }

        input:focus,
        textarea:focus {
            box-shadow: 0 0 15px #4cc9ff;
            border-color: #4cc9ff;
        }

        button {
            padding: 10px;
            border-radius: 10px;
            border: none;
            font-family: inherit;
            background: linear-gradient(135deg, #1f6fb2, #4cc9ff);
            color: var(--text);
            cursor: pointer;
            transition: .2s;
        }

        button:hover {
            transform: scale(1.03);
            box-shadow: 0 0 15px #4cc9ff;
        }

        textarea {
            resize: vertical;
            min-height: 70px;
        }

        button {
            background: var(--water);
            color: var(--text);
            cursor: pointer;
            transition: .3s;
        }

        form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }

        .tags {
            background: rgba(255, 255, 255, 0.05);
            padding: 8px;
            border-radius: 8px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            grid-column: 1/-1;
        }

        .review {
            grid-column: 1/-1
        }

        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 10px;
        }

        .tab {
            padding: 6px 14px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.12);
            cursor: pointer;
            font-size: 14px;
        }

        .tab.active {
            background: var(--water);
            box-shadow: 0 0 10px var(--glow);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }

        .card {
            background: linear-gradient(145deg,
                    rgba(255, 255, 255, 0.14),
                    rgba(255, 255, 255, 0.04));
            border: 1px solid rgba(76, 201, 255, 0.25);
            border-radius: 18px;
            padding: 15px;
            transition: .3s;
            backdrop-filter: blur(10px);
        }


        .card:hover {
            transform: translateY(-14px) scale(1.03);
            box-shadow: 0 18px 45px var(--shadow);
        }

        .card img {
            width: 100%;
            height: 260px;
            object-fit: cover;
            border-radius: 14px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, .4);
        }

        .card {

            transition: transform 0.25s ease, box-shadow 0.25s ease;
            display: flex;
            flex-direction: column;
        }

        .card-actions {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .card h3 {
            min-height: 48px;
        }

        .small {
            font-size: 12px;
            opacity: 0.85
        }

        .delete {
            background: var(--btn-delete);
            margin-top: 6px;
            width: 100%;
        }

        .edit {

            background: var(--btn-edit);
            margin-top: 6px;
            width: 100%;
        }

        .tag {
            background: rgba(76, 201, 255, 0.25);
            padding: 2px 6px;
            border-radius: 10px;
            margin-right: 4px;
            font-size: 11px;
        }

        .profileBox {
            text-align: center;
            margin-bottom: 20px;
        }

        .stats {
            margin-bottom: 15px;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 10px;
        }

        .card,
        .card h3,
        .small,
        .tag,
        .tab,
        label {
            color: var(--text);
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>☾⋆ Biblioteca Phantomime ⋆☽</h1>

        <div class="themes">
            <button onclick="changeTheme('blue')">🌊 Azul</button>
            <button onclick="changeTheme('pink')">🌸 Rosa</button>
            <button onclick="changeTheme('purple')">🪻 Lilás</button>
            <button onclick="changeTheme('lightblue')">🩵 Céu</button>
            <button onclick="changeTheme('red')">❤️ Vermelho</button>
        </div>

        <div class="profileBox">
            <input type="text" id="profileId" placeholder="Nome do perfil" style="width:150px">

            <input type="password" id="profilePassword" placeholder="Senha" style="width:150px">

            <button onclick="createProfile()">Criar perfil</button>

            <div id="profileLabel" class="small"></div>

            <button onclick="adminAccess()">


                🔐 Admin
            </button>
        </div>

        <div class="panel">

            <input type="text" id="search" placeholder="🔎 Buscar livro..." style="margin-bottom:10px;width:100%">

            <div class="stats" id="stats">
                Total de livros: 0 | Total de páginas: 0 | Total gasto: R$ 0
            </div>

            <div class="tabs" id="tabs"></div>

            <form id="bookForm">
                <div style="display:flex; gap:10px; grid-column:1/-1;">
                    <input type="text" id="isbn" placeholder="ISBN">

                    <input type="text" id="searchTitle" placeholder="Título para buscar">

                    <input type="text" id="searchAuthor" placeholder="Autor (opcional)">

                    <button type="button" onclick="searchISBN()">🔎 Buscar Livro</button>
                </div>
                <input type="text" id="title" placeholder="Título" required>
                <input type="text" id="author" placeholder="Autor">
                <input type="number" id="price" placeholder="Preço (R$)" step="0.01">
                <input type="number" id="rating" placeholder="Nota 0-5" min="0" max="5">
                <input type="number" id="pages" placeholder="Páginas" min="1">
                <input type="text" id="cover" placeholder="URL da capa">

                <button type="button" id="coverBtn">📷 Escolher capa</button>
                <input type="file" id="coverFile" accept="image/*" hidden>

                <div class="tags">
                    <label><input type="checkbox" value="Tenho"> Tenho</label>
                    <label><input type="checkbox" value="Já li"> Já li</label>
                    <label><input type="checkbox" value="Quero comprar"> Quero comprar</label>
                    <label><input type="checkbox" value="Emprestei"> Emprestei</label>
                    <label><input type="checkbox" value="Peguei emprestado"> Peguei emprestado</label>
                </div>

                <textarea id="review" class="review" placeholder="Sua resenha sobre o livro..."></textarea>

                <button type="submit">Adicionar</button>
            </form>

            <div class="grid" id="bookList"></div>

        </div>
    </div>

    <script>

        const API_URL = "https://phantomime-backend.onrender.com/data";

        let books = [];
        let profile = null;
        let currentTab = "Todos";
        let editIndex = null;


        const statuses = ["Todos", "Tenho", "Já li", "Quero comprar", "Emprestei", "Peguei emprestado"];

        const list = document.getElementById("bookList");
        const tabs = document.getElementById("tabs");
        const search = document.getElementById("search");
        const searchTitle = document.getElementById("searchTitle");
        const searchAuthor = document.getElementById("searchAuthor");
        const stats = document.getElementById("stats");

        const coverFile =
            document.getElementById("coverFile");

        document.getElementById("coverBtn").onclick = () => {
            coverFile.click();
        };

        async function loadCloud() {

            try {

                const res = await fetch(API_URL);

                return await res.json();

            } catch (e) {

                console.error("Erro ao carregar banco", e);
                return {};

            }

        }

        async function saveCloud(data) {

            await fetch(API_URL, {

                method: "POST",

                headers: {
                    "Content-Type": "application/json"
                },

                body: JSON.stringify(data)

            });

        }

        async function createProfile() {

            const name = prompt("Nome do perfil:");

            if (!name) return;


            const cloud = await loadCloud();


            if (cloud[name]) {

                alert("Esse perfil já existe!");
                return;

            }


            const password = prompt("Crie uma senha:");

            if (!password) return;


            cloud[name] = {

                senha: btoa(password).split("").reverse().join(""),
                books: []

            };


            await saveCloud(cloud);


            alert("Perfil criado!");


            document.getElementById("profileId").value = name;

        }

        async function loadProfile() {



            const id = document.getElementById("profileId").value.trim();
            const pass = document.getElementById("profilePassword").value.trim();

            if (!id) {
                alert("Digite um número de perfil");
                return;
            }

            profile = id;

            const cloud = await loadCloud();

            // compatibilidade com perfis antigos
            if (!cloud[id]) {

                const oldId = Object.keys(cloud).find(key =>
                    cloud[key].nome === id
                );

                if (oldId) {
                    profile = oldId;
                }

            }

            if (Array.isArray(cloud[profile])) {

                cloud[profile] = {
                    senha: "",
                    books: cloud[profile]
                };

                await saveCloud(cloud);

            }


            if (!cloud[profile]) {

                let newPass = prompt("Esse perfil não tem senha ainda. Crie uma senha:");

                if (!newPass) {
                    alert("Perfil cancelado");
                    return;
                }

                cloud[profile] = {
                    senha: btoa(newPass).split("").reverse().join("")
                };

                document.getElementById("profilePassword").value = newPass;

                await saveCloud(cloud);

            }


            if (!cloud[profile].senha) {

                let newPass = prompt("Crie uma senha para esse perfil:");

                if (!newPass) {
                    alert("Perfil cancelado");
                    return;
                }

                cloud[profile].senha = btoa(newPass).split("").reverse().join("");

                await saveCloud(cloud);

                books = cloud[profile].books || [];

                books = books.filter(b => b && b.title);

                document.getElementById("profilePassword").value = newPass;

                document.getElementById("profileLabel").innerText =
                    "Perfil ativo: " + profile;

                createTabs();
                render();
                updateStats();



                return;

            }


            const encoded = btoa(pass).split("").reverse().join("");

            if (cloud[profile].senha !== encoded) {
                alert("Senha incorreta!");
                return;
            }

            books = cloud[profile].books || [];


            document.getElementById("profileLabel").innerText =
                "Perfil ativo: " + profile;


            createTabs();
            render();
            updateStats();

        }

        async function save() {

            const cloud = await loadCloud();

            cloud[profile].books = books;

            await saveCloud(cloud);

        }

        function updateStats() {

            const validBooks = books.filter(b => b);


            const totalBooks = books.filter(b => b && b.title).length;


            const totalPrice = validBooks.reduce((sum, b) => {
                return sum + (Number(b.price) || 0);
            }, 0);


            const totalPages = validBooks.reduce((sum, b) => {
                return sum + (Number(b.pages) || 0);
            }, 0);


            stats.innerText =
                `Total de livros: ${totalBooks} | Total de páginas: ${totalPages} | Total gasto: R$ ${totalPrice.toFixed(2)}`;

        }

        function createTabs() {

            if (!profile) return;

            tabs.innerHTML = "";


            statuses.forEach(s => {

                const validBooks = books.filter(b => b && b.title);


                const count =
                    s === "Todos"
                        ? validBooks.length
                        : validBooks.filter(b => b.tags?.includes(s)).length;

                const el = document.createElement("div");

                el.className =
                    "tab" + (s === currentTab ? " active" : "");


                el.innerText =
                    `${s} (${count})`;


                el.onclick = () => {

                    currentTab = s;

                    createTabs();
                    render();

                };


                tabs.appendChild(el);

            });

        }

        async function adminAccess() {

            const master = prompt("Senha mestre:");

            async function adminAccess() {

                const master = prompt("Senha mestre:");

                const res = await fetch(
                    "https://phantomime-backend.onrender.com/admin/login",
                    {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            password: master
                        })
                    }
                );


                const data = await res.json();


                if (!data.success) {

                    alert("Acesso negado");
                    return;

                }


                const id = prompt("Qual perfil você quer acessar?");


                if (!id) return;


                const cloud = await loadCloud();


                if (!cloud[id]) {

                    alert("Perfil não encontrado");
                    return;

                }


                profile = id;

                books = cloud[id].books || [];

                books = books.filter(b => b && b.title);


                document.getElementById("profileLabel").innerText =
                    "Perfil ativo: " + profile;


                createTabs();
                render();
                updateStats();

            }

            const id = prompt("Qual perfil você quer acessar?");

            if (!id) return;


            const cloud = await loadCloud();


            if (!cloud[id]) {
                alert("Perfil não encontrado");
                return;
            }


            profile = id;


            books = cloud[id].books || [];

            books = books.filter(b => b && b.title);


            document.getElementById("profileId").value = id;

            document.getElementById("profilePassword").value = "";


            document.getElementById("profileLabel").innerText =
                "Perfil ativo: " + profile;


            createTabs();
            render();
            updateStats();

        }

        function render() {

            if (!profile) return;

            list.innerHTML = "";

            let filtered = books.filter(b => {

                if (currentTab !== "Todos" && !b.tags?.includes(currentTab)) return false;

                let q = search.value.toLowerCase();

                if (q && !b.title.toLowerCase().includes(q) && !(b.author || "").toLowerCase().includes(q)) return false;

                return true;

            });

            filtered.filter(b => b).forEach((b) => {

                const i = books.indexOf(b);

                const tagsHTML = (b.tags || []).map(t => `<span class='tag'>${t}</span>`).join("");

                const card = document.createElement("div");
                card.className = "card";

                card.innerHTML = `
<img src="${b.cover || 'https://placehold.co/200x260?text=Livro'}">
<h3>${b.title}</h3>
<div class='small'>${b.author || ""}</div>
<div class='small'>
ISBN: ${b.isbn || ""}
</div>
<div>${tagsHTML}</div>
<div class='small'>⭐ ${b.rating || 0}</div>
<div class='small'>Preço: R$ ${b.price || 0}</div>
<div class='small'>Páginas: ${b.pages || 0}</div>
<div class='small'>${b.review || ""}</div>
<div class="card-actions">
    <button type="button" class='edit' onclick='editBook(${i})'>Editar</button>
    <button class='delete' onclick='removeBook(${i})'>Remover</button>
</div>
`;

                list.appendChild(card);

            });

            updateStats();

        }

        function editBook(i) {

            const b = books[i];

            title.value = b.title;
            author.value = b.author;
            price.value = b.price;
            rating.value = b.rating;
            pages.value = b.pages;
            cover.value = b.cover;
            review.value = b.review;

            form.querySelectorAll("input[type='checkbox']").forEach(c => {
                c.checked = (b.tags || []).includes(c.value);
            });

            editIndex = i;

            form.querySelector("button[type='submit']").innerText = "Salvar edição";

            window.scrollTo({
                top: 0,
                behavior: "smooth"
            });

        }

        async function removeBook(i) {

            if (!confirm("Remover este livro?")) {
                return;
            }


            books.splice(i, 1);


            await save();

            createTabs();
            render();

        }

        const form = document.getElementById("bookForm");

        document.addEventListener("keydown", function (e) {

            if (e.key === "Enter" && e.ctrlKey === false) {

                if (document.activeElement.tagName !== "TEXTAREA") {

                    e.preventDefault();

                    form.requestSubmit();

                }

            }

        });

        coverFile.addEventListener("change", () => {

            const file = coverFile.files[0];

            if (!file) return;


            const reader = new FileReader();


            reader.onload = e => {

                cover.value = e.target.result;

            };


            reader.readAsDataURL(file);

        });

        form.addEventListener("submit", async e => {

            e.preventDefault();

            if (!profile) {
                alert("Entre em um perfil primeiro");
                return;
            }

            const tags = [...form.querySelectorAll("input[type='checkbox']:checked")].map(c => c.value);

            const book = {

                isbn: isbn.value,

                title: title.value,
                isbn: isbn.value,
                author: author.value,
                tags: tags,
                price: price.value,
                rating: rating.value,
                pages: pages.value,
                cover: cover.value,
                review: review.value

            };

            if (editIndex !== null) {

                books[editIndex] = book;

                editIndex = null;

                document.querySelector("#bookForm button").innerText = "Adicionar";

            } else {

                if (editIndex !== null) {

                    books[editIndex] = book;

                    editIndex = null;

                    form.querySelector("button[type='submit']").innerText = "Adicionar";

                } else {

                    books.push(book);

                }

            }

            await save();
            createTabs();
            render();

            form.reset();

            isbn.value = "";
            searchTitle.value = "";
            searchAuthor.value = "";
            cover.value = "";
            coverFile.value = "";

        });

        search.addEventListener("input", render);

        const savedTheme = localStorage.getItem("phantomimeTheme");

        if (savedTheme) {
            changeTheme(savedTheme);
        }

        function changeTheme(theme) {

            localStorage.setItem("phantomimeTheme", theme);

            if (theme === "pink") {

                document.documentElement.style.setProperty("--abyss", "#ffb6d9");
                document.documentElement.style.setProperty("--deep", "#ffc6e2");
                document.documentElement.style.setProperty("--ocean", "#ffd6ea");
                document.documentElement.style.setProperty("--water", "#ff78b5");
                document.documentElement.style.setProperty("--glow", "#ff9dcc");

                document.documentElement.style.setProperty("--text", "#7a3158");
                document.documentElement.style.setProperty("--title", "#9e3f72");

                document.documentElement.style.setProperty("--btn-edit", "#ff78b5");
                document.documentElement.style.setProperty("--btn-delete", "#ff4d6d");

                document.documentElement.style.setProperty("--shadow", "#9e3f72");

            } else {

                document.documentElement.style.setProperty("--abyss", "#010b16");
                document.documentElement.style.setProperty("--deep", "#021B33");
                document.documentElement.style.setProperty("--ocean", "#062a4d");
                document.documentElement.style.setProperty("--water", "#1f6fb2");
                document.documentElement.style.setProperty("--glow", "#4cc9ff");
                document.documentElement.style.setProperty("--text", "white");
                document.documentElement.style.setProperty("--title", "#e7edf5");

                document.documentElement.style.setProperty("--btn-edit", "#1f6fb2");
                document.documentElement.style.setProperty("--btn-delete", "#0b3d66");
                document.documentElement.style.setProperty("--shadow", "#021B33");

                if (theme === "purple") {

                    document.documentElement.style.setProperty("--abyss", "#d9c1f0");
                    document.documentElement.style.setProperty("--deep", "#cba9e8");
                    document.documentElement.style.setProperty("--ocean", "#bd91df");
                    document.documentElement.style.setProperty("--water", "#a06bd0");
                    document.documentElement.style.setProperty("--glow", "#c7a0ef");

                    document.documentElement.style.setProperty("--text", "#55366f");
                    document.documentElement.style.setProperty("--title", "#74459a");

                    document.documentElement.style.setProperty("--btn-edit", "#c7a0ef");
                    document.documentElement.style.setProperty("--btn-delete", "#a06bd0");

                    document.documentElement.style.setProperty("--shadow", "#74459a");
                }
            }
            if (theme === "lightblue") {

                document.documentElement.style.setProperty("--abyss", "#b9dcf5");
                document.documentElement.style.setProperty("--deep", "#a8d0f0");
                document.documentElement.style.setProperty("--ocean", "#8fc2e8");
                document.documentElement.style.setProperty("--water", "#4d94c7");
                document.documentElement.style.setProperty("--glow", "#a9dcff");

                document.documentElement.style.setProperty("--text", "#274b66");
                document.documentElement.style.setProperty("--title", "#356f9d");

                document.documentElement.style.setProperty("--btn-edit", "#4d94c7");
                document.documentElement.style.setProperty("--btn-delete", "#356f9d");
                document.documentElement.style.setProperty("--shadow", "#356f9d");

            }

            if (theme === "red") {

                document.documentElement.style.setProperty("--abyss", "#050003");
                document.documentElement.style.setProperty("--deep", "#120005");
                document.documentElement.style.setProperty("--ocean", "#300008");
                document.documentElement.style.setProperty("--water", "#8b0000");
                document.documentElement.style.setProperty("--glow", "#b30000");

                document.documentElement.style.setProperty("--text", "#f0d9d9");
                document.documentElement.style.setProperty("--title", "#ff5555");

                document.documentElement.style.setProperty("--btn-edit", "#ff7777");
                document.documentElement.style.setProperty("--btn-delete", "#b30000");

                document.documentElement.style.setProperty("--shadow", "#5c0000");

            }

        }

        async function searchISBN() {

            const isbnValue = isbn.value.replace(/[-\s]/g, "");

            const bookTitle =
                searchTitle.value.trim();

            const bookAuthor =
                searchAuthor.value.trim();


            const button = event.target;

            button.innerText = "🔎 Buscando...";


            try {

                let result = null;


                // tenta ISBN

                if (isbnValue) {

                    let res = await fetch(
                        `https://www.googleapis.com/books/v1/volumes?q=isbn:${isbnValue}`
                    );


                    let data = await res.json();


                    if (data.items) {

                        result =
                            data.items[0].volumeInfo;

                    }

                }



                // tenta título + autor

                if (!result && bookTitle) {

                    let query =
                        bookTitle + " " + bookAuthor;


                    let res = await fetch(
                        `https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(query)}`
                    );


                    let data = await res.json();


                    if (data.items) {

                        result =
                            data.items[0].volumeInfo;

                    }

                }



                // tenta Open Library

                if (!result && isbnValue) {


                    let res = await fetch(
                        `https://openlibrary.org/api/books?bibkeys=ISBN:${isbnValue}&format=json&jscmd=data`
                    );


                    let data = await res.json();


                    let key =
                        `ISBN:${isbnValue}`;


                    if (data[key]) {

                        let book = data[key];


                        result = {

                            title: book.title,

                            authors:
                                book.authors
                                    ?.map(a => a.name),

                            pageCount:
                                book.number_of_pages,

                            imageLinks: null

                        };

                    }

                }



                if (!result) {

                    alert(
                        "Livro não encontrado. Preencha manualmente."
                    );

                    return;

                }



                title.value =
                    result.title || "";


                author.value =
                    result.authors
                        ? result.authors.join(", ")
                        : "";


                pages.value =
                    result.pageCount || "";



                // tenta capa Google

                if (result.imageLinks) {


                    cover.value =
                        result.imageLinks.thumbnail
                            .replace("http:", "https:");


                }

                // tenta capa Open Library

                else if (isbnValue) {


                    let url =
                        `https://covers.openlibrary.org/b/isbn/${isbnValue}-L.jpg`;


                    const img = new Image();


                    img.onload = () => {

                        cover.value = url;

                    };


                    img.src = url;

                }



            } catch (e) {

                console.log(e);

                alert("Erro na busca");


            } finally {

                button.innerText = "🔎 Buscar livro";

            }

        }

        function preencherLivro(book) {

            console.log(book);

            title.value = book.title || "";

            author.value =
                book.authors
                    ? book.authors.join(", ")
                    : "";

            pages.value =
                book.pageCount || "";


            if (book.imageLinks) {

                cover.value =
                    (
                        book.imageLinks.extraLarge ||
                        book.imageLinks.large ||
                        book.imageLinks.medium ||
                        book.imageLinks.thumbnail
                    ).replace("http:", "https:");

            }

        }


    </script>
